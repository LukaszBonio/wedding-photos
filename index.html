<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- viewport-fit=cover exposes the iPhone safe-area env() insets used in CSS -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#C8A96A" />
    <meta name="description" content="Prześlij swoje zdjęcia do pary młodej." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Zdjęcia" />
    <link rel="apple-touch-icon" href="/icons/pwa-192x192.png" />
    <title>Zdjęcia weselne</title>
  </head>
  <body>
    <div id="app">
      <!-- Splash screen — visible until Vue mounts, then replaced -->
      <div id="splash" style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: #faf7f1;
        text-align: center;
        padding: 2rem;
        gap: 1.5rem;
      ">
        <div style="
          width: 56px;
          height: 56px;
          border: 3px solid #e7dcc8;
          border-top-color: #c8a96a;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite;
        "></div>
        <div>
          <p style="
            font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #2b2620;
            margin: 0 0 0.4rem;
            line-height: 1.2;
          ">Anna & Łukasz</p>
          <p style="
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.85rem;
            color: #6b6355;
            margin: 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
          ">Ładowanie…</p>
        </div>
      </div>
      <style>
        @keyframes splash-spin {
          to { transform: rotate(360deg); }
        }
        @media (prefers-reduced-motion: reduce) {
          #splash div:first-child { animation: none; border-top-color: #c8a96a; }
        }
      </style>
    </div>
    <noscript>Ta aplikacja wymaga włączonego JavaScriptu, aby wysłać zdjęcia.</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

name: Deploy do GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Uprawnienia wymagane przez GitHub Pages (OIDC).
permissions:
  contents: read
  pages: write
  id-token: write

# Jedno wdrożenie naraz; nowy push anuluje poprzednie.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Zainstaluj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Zainstaluj zależności
        run: npm ci

      - name: Sprawdź jakość (lint + testy)
        run: |
          npm run lint
          npm run test

      # Sekrety wstrzykiwane do bundle'a w czasie builda.
      # UWAGA: obie wartości trafiają do publicznego kodu przeglądarki (patrz README).
      - name: Zbuduj aplikację
        run: npm run build
        env:
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
          VITE_UPLOAD_TOKEN: ${{ secrets.VITE_UPLOAD_TOKEN }}

      - name: Skonfiguruj GitHub Pages
        uses: actions/configure-pages@v5

      - name: Wyślij artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wdróż na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
